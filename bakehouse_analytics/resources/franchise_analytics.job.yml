resources:
  jobs:
    franchise_analytics:
      name: franchise_analytics
      tasks:
        - task_key: franchise_analytics
          disabled: false
          email_notifications: {}
          environment_key: Default
          notebook_task:
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
            notebook_path: ../src/franchise_analytics/franchise_analytics.ipynb
            source: WORKSPACE
          run_if: ALL_SUCCESS
          timeout_seconds: 0
          webhook_notifications: {}
      email_notifications:
        no_alert_for_skipped_runs: false
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      max_concurrent_runs: 1
      performance_target: PERFORMANCE_OPTIMIZED
      queue:
        enabled: true
      timeout_seconds: 0
      webhook_notifications: {}
